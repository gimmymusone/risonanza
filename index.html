<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#B8D4E8">
<title>Risonanza</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: #B8D4E8;
    overscroll-behavior: none;
    font-family: Georgia, serif;
  }
  body { position: relative; }

  .background {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    background-image: url('villaggio.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .cloud { position: absolute; pointer-events: none; }
  @keyframes drift {
    from { transform: translateX(var(--from)); }
    to { transform: translateX(var(--to)); }
  }
  .cloud-move { animation: drift linear infinite; }

  .birds {
    position: absolute; pointer-events: none;
    animation: fly 45s linear infinite;
  }
  @keyframes fly {
    0% { transform: translate(110vw, 0); }
    100% { transform: translate(-20vw, -8vh); }
  }
  @keyframes flap {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.6); }
  }
  .bird { animation: flap 0.4s ease-in-out infinite; transform-origin: center; }
  .bird:nth-child(2) { animation-delay: 0.1s; }
  .bird:nth-child(3) { animation-delay: 0.2s; }

  .sparkle {
    position: absolute; width: 4px; height: 4px;
    background: #FFFFFF; border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1); }
  }

  .window-glow {
    position: absolute; border-radius: 2px;
    background: radial-gradient(circle, rgba(255,216,138,0.9), rgba(255,216,138,0) 70%);
    animation: glow 5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.85; }
  }

  .bubble {
    position: absolute;
    width: 160px; height: 160px;
    border-radius: 50%;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 18px rgba(255,255,255,0.3)) drop-shadow(0 4px 12px rgba(0,0,0,0.12));
  }
  .bubble:active {
    transform: translate(-50%, -50%) scale(0.92);
  }

  .bubble-sphere {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 70% 75%, rgba(180,220,255,0.35) 0%, transparent 25%),
      conic-gradient(from 180deg at 50% 50%,
        rgba(255,200,220,0.18) 0deg,
        rgba(200,230,255,0.22) 60deg,
        rgba(200,255,230,0.18) 120deg,
        rgba(255,240,200,0.20) 180deg,
        rgba(220,200,255,0.22) 240deg,
        rgba(255,210,220,0.18) 300deg,
        rgba(255,200,220,0.18) 360deg),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 70%, transparent 100%);
    box-shadow:
      inset 0 0 0 1.5px rgba(255,255,255,0.6),
      inset 0 0 20px rgba(255,255,255,0.2),
      inset 4px -4px 20px rgba(180,210,240,0.3);
    animation: breathe ease-in-out infinite;
  }

  .bubble-highlight {
    position: absolute;
    top: 15%; left: 20%;
    width: 30%; height: 22%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 40%, transparent 70%);
    border-radius: 50%;
    transform: rotate(-30deg);
    pointer-events: none;
  }
  .bubble-highlight-small {
    position: absolute;
    top: 28%; left: 25%;
    width: 8%; height: 8%;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    pointer-events: none;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  .bubble-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
    text-shadow: 0 1px 3px rgba(30,50,80,0.5), 0 0 8px rgba(30,50,80,0.3);
    pointer-events: none;
    text-align: center;
  }
  .bubble-name {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .bubble-meta {
    font-size: 11px;
    font-style: italic;
    opacity: 0.85;
    letter-spacing: 0.1em;
    text-transform: lowercase;
  }

  .label {
    position: absolute; bottom: 10px; right: 14px;
    color: rgba(30,50,70,0.35);
    font-style: italic;
    font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase; z-index: 10;
  }

  /* ==========================================================
     OVERLAY del flusso — appare in fondo, non copre lo sfondo
     ========================================================== */
  .flow-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .flow-overlay.active { opacity: 1; pointer-events: auto; }

  .flow-overlay::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top,
      rgba(20, 30, 50, 0.55) 0%,
      rgba(20, 30, 50, 0.25) 35%,
      rgba(20, 30, 50, 0) 65%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .flow-overlay.active::before { pointer-events: auto; opacity: 1; }

  .flow-card {
    position: relative;
    width: min(560px, 92vw);
    max-height: 78vh;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border-radius: 28px 28px 18px 18px;
    box-shadow:
      0 -10px 40px rgba(20,40,70,0.18),
      0 -2px 8px rgba(20,40,70,0.08),
      inset 0 1px 0 rgba(255,255,255,0.8);
    margin-bottom: 14px;
    overflow: hidden;
    transform: translateY(40px);
    transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    display: flex;
    flex-direction: column;
  }
  .flow-overlay.active .flow-card { transform: translateY(0); }

  .flow-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 8px;
    border-bottom: 1px solid rgba(60, 80, 110, 0.08);
  }
  .flow-title {
    font-size: 16px;
    color: #2A3850;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .flow-subtitle {
    font-size: 11px;
    color: rgba(60, 80, 110, 0.6);
    font-style: italic;
    letter-spacing: 0.08em;
    text-transform: lowercase;
  }
  .flow-close {
    width: 32px; height: 32px;
    border: none;
    background: rgba(60, 80, 110, 0.08);
    border-radius: 50%;
    color: #2A3850;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .flow-close:hover { background: rgba(60, 80, 110, 0.16); }

  .flow-progress {
    display: flex;
    gap: 6px;
    padding: 10px 18px;
  }
  .flow-progress-step {
    flex: 1;
    height: 3px;
    background: rgba(60, 80, 110, 0.12);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .flow-progress-step.active { background: #2A3850; }
  .flow-progress-step.done { background: rgba(42, 56, 80, 0.55); }

  .flow-body {
    padding: 8px 22px 22px;
    overflow-y: auto;
    flex: 1;
  }

  .flow-step { display: none; animation: fadeStep 0.3s ease; }
  .flow-step.active { display: block; }
  @keyframes fadeStep {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .flow-question {
    font-size: 17px;
    color: #2A3850;
    margin: 6px 0 4px;
    line-height: 1.4;
  }
  .flow-hint {
    font-size: 12px;
    color: rgba(60, 80, 110, 0.65);
    font-style: italic;
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  /* Opzioni a card */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .options.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .options.grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .option {
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(60, 80, 110, 0.12);
    border-radius: 16px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: inherit;
    color: #2A3850;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .option:hover {
    background: rgba(255,255,255,0.85);
    border-color: rgba(60, 80, 110, 0.3);
    transform: translateY(-1px);
  }
  .option.selected {
    background: rgba(42, 56, 80, 0.92);
    border-color: #2A3850;
    color: #FFFFFF;
  }
  .option-icon {
    font-size: 22px;
    line-height: 1;
  }
  .option-label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .option-desc {
    font-size: 11px;
    opacity: 0.7;
    font-style: italic;
    line-height: 1.3;
  }
  .options.grid-3 .option {
    align-items: center;
    text-align: center;
    padding: 14px 6px;
  }
  .options.grid-3 .option .option-label {
    font-size: 12px;
  }

  /* Chip per sfumature */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(60, 80, 110, 0.12);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    color: #2A3850;
    font-size: 13px;
    transition: all 0.2s;
  }
  .chip:hover {
    background: rgba(255,255,255,0.85);
    border-color: rgba(60, 80, 110, 0.3);
  }
  .chip.selected {
    background: rgba(42, 56, 80, 0.92);
    border-color: #2A3850;
    color: #FFFFFF;
  }

  /* Slider intensità */
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .slider-label {
    font-size: 13px;
    color: #2A3850;
    display: flex;
    justify-content: space-between;
  }
  .slider-label span:last-child {
    font-weight: 600;
    color: rgba(60, 80, 110, 0.85);
  }
  input[type="range"] {
    width: 100%;
    accent-color: #2A3850;
  }

  /* Silhouette corpo */
  .body-zones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 8px;
  }
  .body-zone {
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(60, 80, 110, 0.12);
    border-radius: 12px;
    padding: 8px 4px;
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    color: #2A3850;
    font-family: inherit;
    transition: all 0.2s;
  }
  .body-zone:hover { background: rgba(255,255,255,0.85); }
  .body-zone.selected { background: rgba(42, 56, 80, 0.92); color: #FFFFFF; border-color: #2A3850; }

  /* Textarea */
  textarea {
    width: 100%;
    min-height: 120px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(60, 80, 110, 0.15);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    color: #2A3850;
    resize: vertical;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(42, 56, 80, 0.5); }

  /* Anmy mirror block */
  .anmy {
    background: linear-gradient(135deg, rgba(184, 212, 232, 0.55), rgba(220, 200, 255, 0.45));
    border-radius: 16px;
    padding: 14px 16px;
    margin: 14px 0;
    border-left: 3px solid rgba(42, 56, 80, 0.5);
    min-height: 64px;
  }
  .anmy-name {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(42, 56, 80, 0.75);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .anmy-text {
    font-size: 14px;
    color: #2A3850;
    line-height: 1.5;
    font-style: italic;
  }

  /* Footer azioni */
  .flow-footer {
    display: flex;
    gap: 10px;
    padding: 14px 18px;
    border-top: 1px solid rgba(60, 80, 110, 0.08);
    background: rgba(255,255,255,0.4);
  }
  .btn {
    flex: 1;
    padding: 12px 18px;
    border-radius: 14px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-secondary {
    background: rgba(60, 80, 110, 0.1);
    color: #2A3850;
  }
  .btn-secondary:hover { background: rgba(60, 80, 110, 0.18); }
  .btn-primary {
    background: #2A3850;
    color: #FFFFFF;
  }
  .btn-primary:hover { background: #1a2840; }
  .btn-primary:disabled {
    background: rgba(60, 80, 110, 0.25);
    cursor: not-allowed;
  }

  /* Toast di conferma salvataggio */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(42, 56, 80, 0.95);
    color: #FFFFFF;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.05em;
    z-index: 200;
    box-shadow: 0 8px 28px rgba(20,40,70,0.3);
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Bolla evidenziata quando hai una voce in apertura */
  .bubble.glow-pulse .bubble-sphere {
    animation: breathe ease-in-out infinite, pulseRing 2s ease-in-out infinite;
  }
  @keyframes pulseRing {
    0%, 100% { box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.6), inset 0 0 20px rgba(255,255,255,0.2), inset 4px -4px 20px rgba(180,210,240,0.3), 0 0 0 0 rgba(255,255,255,0.4); }
    50% { box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.6), inset 0 0 20px rgba(255,255,255,0.2), inset 4px -4px 20px rgba(180,210,240,0.3), 0 0 0 14px rgba(255,255,255,0); }
  }

  /* ==========================================================
     DIARIO — pulsante in alto a destra + pannello che scende
     ========================================================== */
  .diary-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 90;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.5);
    color: #2A3850;
    border-radius: 999px;
    padding: 9px 16px 9px 12px;
    font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 6px 22px rgba(20,40,70,0.18);
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .diary-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.92); }
  .diary-btn .diary-icon { font-size: 16px; }
  .diary-btn .diary-count {
    background: #2A3850;
    color: #fff;
    font-size: 11px;
    border-radius: 999px;
    padding: 1px 7px;
    min-width: 18px;
    text-align: center;
    line-height: 1.5;
  }
  .diary-btn .diary-count:empty { display: none; }

  .diary-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 50, 0.35);
    backdrop-filter: blur(2px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .diary-overlay.open { opacity: 1; pointer-events: auto; }

  .diary-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    max-width: 460px;
    background: linear-gradient(180deg, #FAF7F0 0%, #F0EBE0 100%);
    z-index: 101;
    transform: translateX(100%);
    transition: transform 0.42s cubic-bezier(0.2, 0.9, 0.3, 1);
    display: flex;
    flex-direction: column;
    box-shadow: -10px 0 40px rgba(20,40,70,0.25);
  }
  .diary-panel.open { transform: translateX(0); }

  .diary-header {
    padding: 22px 22px 12px;
    border-bottom: 1px solid rgba(60,80,110,0.12);
    flex-shrink: 0;
  }
  .diary-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .diary-title {
    font-size: 22px;
    color: #2A3850;
    letter-spacing: 0.02em;
    margin: 0;
  }
  .diary-subtitle {
    font-size: 12px;
    color: rgba(60,80,110,0.7);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .diary-close {
    background: rgba(60,80,110,0.08);
    border: none;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 18px;
    color: #2A3850;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .diary-close:hover { background: rgba(60,80,110,0.16); }

  .diary-filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .diary-filters::-webkit-scrollbar { display: none; }
  .diary-filter {
    background: rgba(60,80,110,0.08);
    border: none;
    color: #2A3850;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.04em;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
  }
  .diary-filter.active {
    background: #2A3850;
    color: #fff;
  }

  .diary-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px 90px;
  }
  .diary-empty {
    text-align: center;
    padding: 60px 30px;
    color: rgba(60,80,110,0.6);
    font-size: 14px;
    line-height: 1.55;
  }
  .diary-empty .empty-icon {
    font-size: 38px;
    margin-bottom: 14px;
    opacity: 0.5;
  }

  .diary-day {
    margin-bottom: 18px;
  }
  .diary-day-label {
    font-size: 11px;
    color: rgba(60,80,110,0.6);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 4px 0 8px 6px;
  }

  .diary-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    border-left: 3px solid var(--sphere-color, rgba(60,80,110,0.4));
  }
  .diary-card:hover { transform: translateX(2px); box-shadow: 0 4px 14px rgba(20,40,70,0.10); }
  .diary-card[data-sphere="emozioni"] { --sphere-color: #6FA5C9; }
  .diary-card[data-sphere="pensieri"] { --sphere-color: #C9C2D8; }
  .diary-card[data-sphere="contesto"] { --sphere-color: #C9A06F; }
  .diary-card[data-sphere="azioni"]   { --sphere-color: #8FB37A; }

  .diary-card-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .diary-card-sphere {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(60,80,110,0.7);
  }
  .diary-card-time {
    font-size: 11px;
    color: rgba(60,80,110,0.55);
  }
  .diary-card-title {
    font-size: 15px;
    color: #2A3850;
    font-weight: 500;
    margin-bottom: 4px;
    line-height: 1.35;
  }
  .diary-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }
  .diary-tag {
    font-size: 11px;
    background: rgba(60,80,110,0.08);
    color: rgba(60,80,110,0.85);
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .diary-card-text {
    font-size: 13px;
    color: rgba(60,80,110,0.85);
    line-height: 1.5;
    margin-top: 8px;
    font-style: italic;
    border-left: 2px solid rgba(60,80,110,0.15);
    padding-left: 10px;
  }
  .diary-card-links {
    margin-top: 10px;
    padding-top: 8px;

    return {
      target: "contesto",
      preset: { tipo: "persona" },
      reason: "Un frutto si raccoglie sempre per qualcuno. Aggiungi la persona o il gruppo a cui era diretta."
    };
  }
  if (sphere === "contesto" && state.tipo === "persona" && (state.qualita === "tensione" || state.qualita === "distanza")) {
    return {
      target: "emozioni",
      preset: { innesco: "persona", originPersona: state.ancoraggio },
      reason: "Una " + (state.qualita === "tensione" ? "tensione" : "distanza") + " relazionale lascia sempre un'eco emotiva. Dalle una forma."
    };
  }
  if (sphere === "contesto" && state.qualita === "ricorrenza" && Array.isArray(state.sfumatura) && state.sfumatura.includes("Mi sento in gabbia")) {
    return {
      target: "emozioni",
      preset: { innesco: "luogo" },
      reason: "Un senso di gabbia chiede uno sguardo affettivo. Cosa scorre nel ruscello?"
    };
  }
  return null;
}

function getSuggestedLink(sphere, state) {
  if (sphere === "emozioni" && state.qualita === "vortice") {
    return {
      target: state.innesco === "persona" ? "contesto" : (state.innesco === "pensiero" ? "pensieri" : null),
      preset: state.innesco === "persona" ? { tipo: "persona" } : (state.innesco === "pensiero" ? { tipo: "arrivato" } : {}),
      reason: "Un Vortice è denso. Vuoi metterci accanto qualcosa che lo accompagna?"
    };
  }
  if (sphere === "pensieri" && state.qualita === "nuvola" && Array.isArray(state.sfumatura) ? state.sfumatura.includes("Rimuginio") : state.sfumatura === "Rimuginio") {
    return {
      target: "contesto",
      preset: {},
      reason: "Su chi o cosa stai rimuginando? Apri il villaggio e annotalo."
    };
  }
  if (sphere === "azioni" && state.tipo === "bosco" && state.energia && state.energia.ritorno >= 4) {
    return {
      target: "emozioni",
      preset: { tipo: "onda" },
      reason: "Un'azione che ti ha nutrito merita di essere riconosciuta anche nel ruscello."
    };
  }
  if (sphere === "azioni" && state.tipo === "selvatiche") {
    return {
      target: "emozioni",
      preset: { tipo: "onda", innesco: "azione" },
      reason: "Cosa l'ha innescata? Vuoi annotarne l'eco emotiva?"
    };
  }
  return null;
}

/* ==========================================================
   STATE GLOBALE + persistenza
   ========================================================== */
let voices = [];
try {
  voices = JSON.parse(localStorage.getItem("risonanza_voices") || "[]");
} catch (e) { voices = []; }

let currentSphere = null;
let currentStep = 0;
let state = {};
let chain = { preset: null, originVoiceId: null, originSphere: null, queue: [] };

/* DOM */
const overlay = document.getElementById("flowOverlay");
const titleEl = document.getElementById("flowTitle");
const subtitleEl = document.getElementById("flowSubtitle");
const progressEl = document.getElementById("flowProgress");
const bodyEl = document.getElementById("flowBody");
const btnBack = document.getElementById("btnBack");
const btnNext = document.getElementById("btnNext");
const btnClose = document.getElementById("flowClose");
const toastEl = document.getElementById("toast");

/* ==========================================================
   APRI / CHIUDI FLUSSO
   ========================================================== */
document.querySelectorAll(".bubble").forEach(el => {
  el.addEventListener("click", () => openSphere(el.dataset.sphere));
});

function openSphere(sphereKey, opts = {}) {
  currentSphere = sphereKey;
  currentStep = 0;
  state = {};
  // se arriviamo da una catena, pre-compila lo stato
  if (opts.preset) {
    Object.assign(state, opts.preset);
    chain = {
      preset: opts.preset,
      originVoiceId: opts.originVoiceId || null,
      originSphere: opts.originSphere || null,
      queue: opts.queue || []
    };
  } else {
    chain = { preset: null, originVoiceId: null, originSphere: null, queue: [] };
  }
  const conf = SPHERES[sphereKey];
  titleEl.textContent = conf.title + (chain.preset ? " · filo" : "");
  subtitleEl.textContent = chain.preset ? "collegata a " + (SPHERES[chain.originSphere]?.title || "") : conf.subtitle;
  // se la prima domanda è da skippare avanza
  jumpToFirstValidStep();
  buildProgress();
  renderStep();
  overlay.classList.add("active");
}

function closeSphere() {
  overlay.classList.remove("active");
  setTimeout(() => {
    bodyEl.innerHTML = "";
    currentSphere = null;
    chain = { preset: null, originVoiceId: null, originSphere: null, queue: [] };
  }, 350);
}

btnClose.addEventListener("click", () => {
  // se siamo in una catena, chiudi tutto senza riaprire
  closeSphere();
});
overlay.addEventListener("click", (e) => {
  if (e.target === overlay) closeSphere();
});

/* ==========================================================
   SKIP INTELLIGENTE
   ========================================================== */
function shouldSkipStep(step) {
  if (!step) return false;
  if (step.skipIf && step.skipIf({ state, chain })) return true;
  if (step.skipIf2 && step.skipIf2({ state, chain })) return true;
  return false;
}

function jumpToFirstValidStep() {
  const conf = SPHERES[currentSphere];
  while (currentStep < conf.steps.length && shouldSkipStep(conf.steps[currentStep])) {
    currentStep++;
  }
}

function visibleSteps() {
  const conf = SPHERES[currentSphere];
  return conf.steps.filter(s => !shouldSkipStep(s));
}

/* ==========================================================
   PROGRESS BAR (mostra solo gli step visibili)
   ========================================================== */
function buildProgress() {
  progressEl.innerHTML = "";
  const vs = visibleSteps();
  vs.forEach(() => {
    const s = document.createElement("div");
    s.className = "flow-progress-step";
    progressEl.appendChild(s);
  });
  updateProgress();
}
function updateProgress() {
  const vs = visibleSteps();
  const conf = SPHERES[currentSphere];
  const currentStepObj = conf.steps[currentStep];
  const visibleIdx = vs.findIndex(s => s.id === currentStepObj?.id);
  // ricostruisce la progress se cambia (skipIf può cambiare in base a state)
  if (progressEl.children.length !== vs.length) buildProgress();
  [...progressEl.children].forEach((c, i) => {
    c.classList.remove("active", "done");
    if (i < visibleIdx) c.classList.add("done");
    else if (i === visibleIdx) c.classList.add("active");
  });
}

/* ==========================================================
   RENDER STEP
   ========================================================== */
function renderStep() {
  // assicurati che il passo corrente non sia da skippare
  jumpToFirstValidStep();
  const conf = SPHERES[currentSphere];
  if (currentStep >= conf.steps.length) {
    // tutto saltato, vai al salvataggio
    saveVoice();
    return;
  }
  const step = conf.steps[currentStep];
  bodyEl.innerHTML = "";

  const stepDiv = document.createElement("div");
  stepDiv.className = "flow-step active";

  // Avviso "voce a catena"
  if (chain.preset && currentStep === firstVisibleIndex()) {
    const chainNote = document.createElement("div");
    chainNote.className = "anmy";
    chainNote.style.background = "linear-gradient(135deg, rgba(255,235,180,0.5), rgba(255,210,160,0.4))";
    chainNote.style.borderLeftColor = "rgba(180, 140, 60, 0.6)";
    chainNote.style.marginTop = "0";
    chainNote.innerHTML = `
      <div class="anmy-name">filo dal villaggio</div>
      <div class="anmy-text">Stai aggiungendo una voce collegata. Alcuni campi sono già pre-compilati.</div>
    `;
    stepDiv.appendChild(chainNote);
  }

  const q = document.createElement("div");
  q.className = "flow-question";
  q.textContent = typeof step.question === "function" ? step.question({ state, chain }) : step.question;
  stepDiv.appendChild(q);

  if (step.hint) {
    const h = document.createElement("div");
    h.className = "flow-hint";
    h.textContent = step.hint;
    stepDiv.appendChild(h);
  }

  if (step.kind === "options") renderOptions(stepDiv, step);
  else if (step.kind === "chips") renderChips(stepDiv, step);
  else if (step.kind === "slider") renderSlider(stepDiv, step);
  else if (step.kind === "double-slider") renderDoubleSlider(stepDiv, step);
  else if (step.kind === "body") renderBody(stepDiv, step);
  else if (step.kind === "text") renderText(stepDiv, step);

  bodyEl.appendChild(stepDiv);
  if (step.kind === "text") updateAnmy();
  updateProgress();
  updateNavButtons();

  const isLast = currentStep === conf.steps.length - 1 || nextValidStep() == null;
  btnNext.textContent = isLast ? "Salva nel Villaggio" : "Avanti";
}

function firstVisibleIndex() {
  const conf = SPHERES[currentSphere];
  for (let i = 0; i < conf.steps.length; i++) {
    if (!shouldSkipStep(conf.steps[i])) return i;
  }
  return 0;
}

function nextValidStep() {
  const conf = SPHERES[currentSphere];
  let i = currentStep + 1;
  while (i < conf.steps.length && shouldSkipStep(conf.steps[i])) i++;
  return i < conf.steps.length ? i : null;
}

function prevValidStep() {
  const conf = SPHERES[currentSphere];
  let i = currentStep - 1;
  while (i >= 0 && shouldSkipStep(conf.steps[i])) i--;
  return i >= 0 ? i : null;
}

/* ----- options ----- */
function renderOptions(parent, step) {
  const wrap = document.createElement("div");
  wrap.className = "options " + (step.layout || "");
  let opts = step.options;
  if (step.optionsBy) {
    opts = step.optionsBy[state.tipo] || [];
  }
  opts.forEach(o => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.type = "button";
    if (state[step.key] === o.value) btn.classList.add("selected");
    btn.innerHTML = `
      ${o.icon ? `<span class="option-icon">${o.icon}</span>` : ""}
      <span class="option-label">${o.label}</span>
      ${o.desc ? `<span class="option-desc">${o.desc}</span>` : ""}
    `;
    btn.addEventListener("click", () => {
      const wasSelected = state[step.key] === o.value;
      state[step.key] = o.value;
      if (step.key === "qualita" || step.key === "tipo") {
        delete state.sfumatura;
      }
      const nextIdx = nextValidStep();
      if (!wasSelected && nextIdx != null) {
        setTimeout(() => {
          if (currentSphere) {
            currentStep = nextIdx;
            renderStep();
          }
        }, 220);
      } else {
        renderStep();
      }
    });
    wrap.appendChild(btn);
  });
  parent.appendChild(wrap);
}

/* ----- chips (con multi-select) ----- */
function renderChips(parent, step) {
  const wrap = document.createElement("div");
  wrap.className = "chips";
  let chips = step.chips;
  if (step.chipsBy) {
    chips = step.chipsBy[state.qualita] || [];
  }
  if (!chips.length) {
    const empty = document.createElement("div");
    empty.className = "flow-hint";
    empty.textContent = "Salta pure questo passaggio.";
    parent.appendChild(empty);
    return;
  }
  chips.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.type = "button";
    btn.textContent = c;
    const cur = state[step.key];
    let isSel = false;
    if (step.multi) {
      const arr = Array.isArray(cur) ? cur : (cur ? [cur] : []);
      isSel = arr.includes(c);
    } else {
      isSel = cur === c;
    }
    if (isSel) btn.classList.add("selected");
    btn.addEventListener("click", () => {
      if (step.multi) {
        const arr = Array.isArray(state[step.key]) ? [...state[step.key]] : (state[step.key] ? [state[step.key]] : []);
        const i = arr.indexOf(c);
        if (i >= 0) arr.splice(i, 1); else arr.push(c);
        state[step.key] = arr;
      } else {
        state[step.key] = state[step.key] === c ? null : c;
      }
      renderStep();
    });
    wrap.appendChild(btn);
  });
  if (step.multi) {
    const helper = document.createElement("div");
    helper.className = "flow-hint";
    helper.style.marginTop = "8px";
    helper.textContent = "Puoi sceglierne più di una.";
    parent.appendChild(helper);
  }
  parent.appendChild(wrap);
}

/* ----- slider ----- */
function renderSlider(parent, step) {
  const cur = state[step.key] ?? step.defaultValue ?? Math.round((step.min + step.max) / 2);
  state[step.key] = cur;
  const row = document.createElement("div");
  row.className = "slider-row";
  row.innerHTML = `
    <div class="slider-label"><span>${step.min}</span><span id="slVal">${cur}</span><span>${step.max}</span></div>
    <input type="range" min="${step.min}" max="${step.max}" value="${cur}" id="slInput">
  `;
  parent.appendChild(row);
  const input = row.querySelector("#slInput");
  const val = row.querySelector("#slVal");
  input.addEventListener("input", () => {
    state[step.key] = +input.value;
    val.textContent = input.value;
  });
}

/* ----- double slider ----- */
function renderDoubleSlider(parent, step) {
  const cur = state[step.key] || { costo: 3, ritorno: 3 };
  state[step.key] = cur;
  step.labels.forEach((label, i) => {
    const k = i === 0 ? "costo" : "ritorno";
    const row = document.createElement("div");
    row.className = "slider-row";
    row.innerHTML = `
      <div class="slider-label"><span>${label}</span><span class="slV">${cur[k]}</span></div>
      <input type="range" min="${step.min}" max="${step.max}" value="${cur[k]}" data-k="${k}">
    `;
    parent.appendChild(row);
  });
  parent.querySelectorAll('input[type="range"]').forEach(inp => {
    inp.addEventListener("input", () => {
      const k = inp.dataset.k;
      state[step.key][k] = +inp.value;
      inp.parentNode.parentNode.querySelector(".slV").textContent = inp.value;
    });
  });
}

/* ----- body silhouette ----- */
function renderBody(parent, step) {
  const zones = ["Testa", "Gola", "Petto", "Pancia", "Schiena", "Braccia/Gambe", "Ovunque", "Non la trovo"];
  const wrap = document.createElement("div");
  wrap.className = "body-zones";
  zones.forEach(z => {
    const btn = document.createElement("button");
    btn.className = "body-zone";
    btn.type = "button";
    btn.textContent = z;
    if (state[step.key] === z) btn.classList.add("selected");
    btn.addEventListener("click", () => {
      state[step.key] = state[step.key] === z ? null : z;
      renderStep();
    });
    wrap.appendChild(btn);
  });
  parent.appendChild(wrap);
}

/* ----- text + Anmy + ricorrenza + collegamento ----- */
function renderText(parent, step) {
  const ta = document.createElement("textarea");
  ta.placeholder = "Scrivi liberamente…";
  ta.value = state[step.key] || "";
  ta.addEventListener("input", () => {
    state[step.key] = ta.value;
    updateAnmy();
    updateNavButtons();
  });
  parent.appendChild(ta);

  // Anmy mirror
  const anmy = document.createElement("div");
  anmy.className = "anmy";
  anmy.id = "anmyBlock";
  parent.appendChild(anmy);

  // Ricorrenza
  const recurDiv = document.createElement("div");
  recurDiv.style.marginTop = "10px";
  const recurQ = typeof step.recurrenceQuestion === "function"
    ? step.recurrenceQuestion({ state, chain })
    : step.recurrenceQuestion;
  recurDiv.innerHTML = `<div class="flow-question" style="font-size:15px;margin-top:14px;">${recurQ}</div>`;
  const opts = document.createElement("div");
  opts.className = "options grid-3";
  ["Sì", "No", "Non lo so"].forEach(v => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "option";
    if (state.ricorrenza === v) b.classList.add("selected");
    b.innerHTML = `<span class="option-label">${v}</span>`;
    b.addEventListener("click", () => {
      state.ricorrenza = state.ricorrenza === v ? null : v;
      renderStep();
    });
    opts.appendChild(b);
  });
  recurDiv.appendChild(opts);
  parent.appendChild(recurDiv);

  // Avviso collegamento obbligatorio o suggerito
  const required = getRequiredLink(currentSphere, state);
  const suggested = !required ? getSuggestedLink(currentSphere, state) : null;
  const link = required || suggested;

  if (link) {
    const linkBox = document.createElement("div");
    linkBox.className = "anmy";
    if (required) {
      linkBox.style.background = "linear-gradient(135deg, rgba(255,210,180,0.55), rgba(255,180,180,0.4))";
      linkBox.style.borderLeftColor = "rgba(180, 80, 60, 0.7)";
    } else {
      linkBox.style.background = "linear-gradient(135deg, rgba(200,225,255,0.5), rgba(220,210,255,0.4))";
      linkBox.style.borderLeftColor = "rgba(80, 110, 180, 0.55)";
    }
    linkBox.innerHTML = `
      <div class="anmy-name">${required ? "filo da chiudere" : "vuoi tessere un filo?"}</div>
      <div class="anmy-text">${link.reason}</div>
      <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
        <button class="btn btn-primary" style="flex:0 0 auto; padding:8px 14px; font-size:13px; border-radius:999px;" id="btnChainNow">
          Apri ${SPHERES[link.target]?.title || link.target}
        </button>
        ${!required ? `<button class="btn btn-secondary" style="flex:0 0 auto; padding:8px 14px; font-size:13px; border-radius:999px;" id="btnChainSkip">Salta</button>` : ""}
      </div>
    `;
    parent.appendChild(linkBox);
    setTimeout(() => {
      const b1 = document.getElementById("btnChainNow");
      const b2 = document.getElementById("btnChainSkip");
      if (b1) b1.addEventListener("click", () => {
        // salva la voce corrente, poi apri quella collegata in catena
        const saved = saveVoice({ silent: true, returnVoice: true });
        openSphere(link.target, {
          preset: { ...link.preset },
          originVoiceId: saved.id,
          originSphere: currentSphere
        });
      });
      if (b2) b2.addEventListener("click", () => {
        // marca come "salta": chiudi e nasconde il box per il resto della sessione
        state._skipSuggested = true;
        renderStep();
      });
    }, 0);
  }

  // Suggerisci voci esistenti correlate (multi-select se più di una)
  if (chain.preset && chain.originVoiceId) {
    // niente: la voce è la catena stessa
  } else {
    const related = findRelatedVoices();
    if (related.length > 0) {
      const relBox = document.createElement("div");
      relBox.className = "anmy";
      relBox.style.background = "linear-gradient(135deg, rgba(220,235,210,0.55), rgba(200,230,220,0.45))";
      relBox.style.borderLeftColor = "rgba(80, 130, 80, 0.6)";
      relBox.innerHTML = `
        <div class="anmy-name">voci già nel villaggio</div>
        <div class="anmy-text">Vuoi collegare questa voce ad altre già scritte?</div>
        <div id="relatedList" style="display:flex; flex-direction:column; gap:6px; margin-top:10px;"></div>
      `;
      parent.appendChild(relBox);
      const list = relBox.querySelector("#relatedList");
      related.forEach(v => {
        const r = document.createElement("button");
        r.type = "button";
        r.className = "chip";
        r.style.textAlign = "left";
        r.style.justifyContent = "flex-start";
        r.style.fontSize = "12px";
        const sel = (state._linkedVoices || []).includes(v.id);
        if (sel) r.classList.add("selected");
        r.innerHTML = `<span style="opacity:0.7; margin-right:6px;">${SPHERES[v.sphere]?.title.toLowerCase()}</span> ${escapeHtml((v.state.testo || "(senza testo)").slice(0, 60))}${(v.state.testo || "").length > 60 ? "…" : ""}`;
        r.addEventListener("click", () => {
          const arr = state._linkedVoices ? [...state._linkedVoices] : [];
          const i = arr.indexOf(v.id);
          if (i >= 0) arr.splice(i, 1); else arr.push(v.id);
          state._linkedVoices = arr;
          renderStep();
        });
        list.appendChild(r);
      });
    }
  }
}

function findRelatedVoices() {
  // cerca voci recenti che condividono persona/ambiente/sfumatura/qualita
  if (!voices.length) return [];
  const recent = voices.slice(-30).reverse();
  const matches = recent.filter(v => {
    if (v.sphere === currentSphere && v.state.qualita === state.qualita) return true;
    if (state.ancoraggio && v.state.ancoraggio === state.ancoraggio) return true;
    if (state.innesco === "persona" && v.sphere === "contesto" && v.state.tipo === "persona") return true;
    if (state.innesco === "luogo" && v.sphere === "contesto" && v.state.tipo === "ambiente") return true;
    return false;
  }).slice(0, 5);
  return matches;
}

/* ==========================================================
   ANMY MIRROR
   ========================================================== */
function updateAnmy() {
  const block = document.getElementById("anmyBlock");
  if (!block) return;
  const text = state.testo || "";
  if (!text.trim()) {
    block.innerHTML = `<div class="anmy-name">Anmy</div><div class="anmy-text">Quando inizi a scrivere, ti restituisco le tue parole con la cornice che hai costruito.</div>`;
    return;
  }
  block.innerHTML = `
    <div class="anmy-name">Anmy</div>
    <div class="anmy-text">${buildMirror()}</div>
  `;
}

function buildMirror() {
  const parts = [];
  const sf = formatSfumatura();
  if (currentSphere === "pensieri") {
    const tipo = state.tipo === "arrivato" ? "ti è arrivato" : "hai costruito tu";
    const q = state.qualita ? labelOf("pensieri", "qualita", state.qualita) : null;
    parts.push(`Hai annotato un pensiero che ${tipo}${q ? `, con la forma di una ${q.toLowerCase()}` : ""}.`);
    if (sf) parts.push(`L'hai chiamato ${sf}.`);
    if (state.tempo) parts.push(`Si muove ${state.tempo === 'da_un_po' ? "da un po'" : state.tempo}.`);
    if (Array.isArray(state.ambito) && state.ambito.length) parts.push(`Riguarda: ${state.ambito.join(", ")}.`);
  } else if (currentSphere === "emozioni") {
    const tipo = state.tipo === "onda" ? "un'onda" : "un clima";
    const q = state.qualita ? labelOf("emozioni", "qualita", state.qualita) : null;
    parts.push(`Hai descritto ${tipo}${q ? ` come ${q.toLowerCase()}` : ""}.`);
    if (sf) parts.push(`Le hai dato il nome di ${sf.toLowerCase()}.`);
    if (state.felt_sense) parts.push(`Nel corpo: ${state.felt_sense.toLowerCase()}.`);
    if (state.intensita) parts.push(`Intensità: ${state.intensita} su 5.`);
  } else if (currentSphere === "azioni") {
    const tipo = state.tipo ? `nel ${labelOf("azioni", "tipo", state.tipo)}` : "";
    const q = state.qualita ? labelOf("azioni", "qualita", state.qualita) : null;
    parts.push(`Hai piantato ${q ? `un ${q.toLowerCase()}` : "un'azione"} ${tipo}.`);
    if (sf) parts.push(`L'hai vissuta come "${sf.toLowerCase()}".`);
    if (state.energia) parts.push(`Costo ${state.energia.costo}, ritorno ${state.energia.ritorno}.`);
  } else if (currentSphere === "contesto") {
    const tipo = state.tipo === "persona" ? "una persona" : "un ambiente";
    const q = state.qualita ? labelOf("contesto", "qualita", state.qualita) : null;
    parts.push(`Hai annotato ${tipo}${q ? `, qualità ${q}` : ""}.`);
    if (sf) parts.push(`Sfumature: ${sf.toLowerCase()}.`);
    if (state.ancoraggio) parts.push(`Nel villaggio: ${labelOf("contesto", "ancoraggio", state.ancoraggio).toLowerCase()}.`);
  }
  if (Array.isArray(state._linkedVoices) && state._linkedVoices.length) {
    parts.push(`Hai legato ${state._linkedVoices.length} ${state._linkedVoices.length === 1 ? "voce" : "voci"} già nel villaggio.`);
  }
  parts.push(`Le tue parole: «${escapeHtml((state.testo || "").trim()).slice(0, 220)}${(state.testo || "").length > 220 ? "…" : ""}»`);
  return parts.join(" ");
}

function formatSfumatura() {
  const v = state.sfumatura;
  if (!v) return null;
  if (Array.isArray(v)) return v.length ? v.join(", ") : null;
  return v;
}

function labelOf(sphere, key, value, tipoCtx) {
  const conf = SPHERES[sphere];
  if (!conf) return value;
  const tipoUse = tipoCtx || state.tipo;
  for (const step of conf.steps) {
    if (step.key !== key) continue;
    let opts = step.options;
    if (step.optionsBy) opts = step.optionsBy[tipoUse] || [];
    if (opts) {
      const found = opts.find(o => o.value === value);
      if (found) return found.label;
    }
    // chips (sfumature) sono stringhe — le restituisco invariate
    let chips = step.chips;
    if (step.chipsBy) {
      const qualUse = (tipoCtx ? value : null); // non sempre disponibile
      chips = step.chipsBy[state.qualita] || [];
    }
    if (Array.isArray(chips) && chips.includes(value)) return value;
  }
  return value;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ==========================================================
   NAVIGAZIONE
   ========================================================== */
btnBack.addEventListener("click", () => {
  const prev = prevValidStep();
  if (prev == null) {
    closeSphere();
  } else {
    currentStep = prev;
    renderStep();
  }
});

btnNext.addEventListener("click", () => {
  const conf = SPHERES[currentSphere];
  const step = conf.steps[currentStep];
  if (!isStepValid(step)) return;
  const next = nextValidStep();
  if (next != null) {
    currentStep = next;
    renderStep();
  } else {
    saveVoice();
  }
});

function isStepValid(step) {
  if (step.optional) return true;
  const v = state[step.key];
  if (step.kind === "text") {
    return !!(v && v.trim().length > 0) && !!state.ricorrenza;
  }
  if (step.kind === "slider") return v != null;
  if (step.kind === "double-slider") return v && v.costo != null && v.ritorno != null;
  if (Array.isArray(v)) return v.length > 0;
  return v != null && v !== "";
}

function updateNavButtons() {
  const conf = SPHERES[currentSphere];
  const step = conf.steps[currentStep];
  btnNext.disabled = !isStepValid(step);
  btnBack.textContent = prevValidStep() == null ? "Chiudi" : "Indietro";
}

/* ==========================================================
   SALVATAGGIO + CATENA
   ========================================================== */
function saveVoice(opts = {}) {
  const voice = {
    id: Date.now() + "_" + Math.random().toString(36).slice(2, 7),
    sphere: currentSphere,
    state: { ...state },
    links: Array.isArray(state._linkedVoices) ? [...state._linkedVoices] : [],
    chainOrigin: chain.originVoiceId || null,
    createdAt: new Date().toISOString()
  };
  // se c'è un'origine, aggiungi il link inverso
  if (chain.originVoiceId) {
    const origin = voices.find(v => v.id === chain.originVoiceId);
    if (origin) {
      origin.links = origin.links || [];
      if (!origin.links.includes(voice.id)) origin.links.push(voice.id);
    }
    voice.links.push(chain.originVoiceId);
  }
  voices.push(voice);
  try { localStorage.setItem("risonanza_voices", JSON.stringify(voices)); } catch (e) {}
  updateDiaryCount();
  if (!opts.silent) {
    showToast(chain.originVoiceId ? "Filo intrecciato nel Villaggio" : "Voce salvata nel Villaggio");
    closeSphere();
  }
  if (opts.returnVoice) return voice;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 2400);
}

/* ==========================================================
   DIARIO — vista di tutte le voci salvate
   ========================================================== */
const SPHERE_LABEL = {
  emozioni: { name: "Emozioni", place: "il ruscello", icon: "💧" },
  pensieri: { name: "Pensieri", place: "il cielo",    icon: "☁️" },
  contesto: { name: "Contesto", place: "il villaggio",icon: "🏘" },
  azioni:   { name: "Azioni",   place: "la foresta",  icon: "🌳" }
};

let diaryFilter = "tutte";
let diaryExpandedId = null;

const diaryBtn      = document.getElementById("diaryBtn");
const diaryCountEl  = document.getElementById("diaryCount");
const diaryOverlay  = document.getElementById("diaryOverlay");
const diaryPanel    = document.getElementById("diaryPanel");
const diaryClose    = document.getElementById("diaryClose");
const diaryListEl   = document.getElementById("diaryList");
const diaryFiltersEl= document.getElementById("diaryFilters");

function updateDiaryCount() {
  const n = (voices || []).length;
  diaryCountEl.textContent = n > 0 ? String(n) : "";
}

function openDiary() {
  // ricarica da localStorage in caso di modifiche concorrenti
  voices = JSON.parse(localStorage.getItem("risonanza_voices") || "[]");
  diaryExpandedId = null;
  renderDiary();
  diaryOverlay.classList.add("open");
  diaryPanel.classList.add("open");
  diaryPanel.setAttribute("aria-hidden", "false");
}

function closeDiary() {
  diaryOverlay.classList.remove("open");
  diaryPanel.classList.remove("open");
  diaryPanel.setAttribute("aria-hidden", "true");
}

function relativeTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return "adesso";
  if (diff < 3600) return Math.floor(diff/60) + " min fa";
  const sameDay = d.toDateString() === now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const isYesterday = d.toDateString() === yesterday.toDateString();
  const hh = String(d.getHours()).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  if (sameDay) return hh + ":" + mm;
  if (isYesterday) return "ieri " + hh + ":" + mm;
  return d.toLocaleDateString("it-IT", { day:"numeric", month:"short" }) + " " + hh + ":" + mm;
}

function dayKey(iso) {
  const d = new Date(iso);
  const now = new Date();
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === now.toDateString()) return "Oggi";
  if (d.toDateString() === yest.toDateString()) return "Ieri";
  return d.toLocaleDateString("it-IT", { weekday:"long", day:"numeric", month:"long" });
}

function safeLabel(sphere, key, value, tipoCtx) {
  if (value === undefined || value === null || value === "") return null;
  if (Array.isArray(value)) {
    return value.map(v => safeLabel(sphere, key, v, tipoCtx)).filter(Boolean).join(", ");
  }
  try {
    const out = labelOf(sphere, key, value, tipoCtx);
    return out || String(value);
  } catch (e) { return String(value); }
}

function voiceTitle(v) {
  const s = v.state || {};
  const sphere = v.sphere;
  const tipoCtx = s.tipo;
  const qualita = safeLabel(sphere, "qualita", s.qualita, tipoCtx);
  let sfumatura = null;
  if (s.sfumatura) {
    const arr = Array.isArray(s.sfumatura) ? s.sfumatura : [s.sfumatura];
    sfumatura = arr.slice(0, 2).join(", ");
  }
  if (qualita && sfumatura) return qualita + " · " + sfumatura;
  if (qualita) return qualita;
  if (sfumatura) return sfumatura;
  if (s.tipo) return safeLabel(sphere, "tipo", s.tipo, tipoCtx);
  return SPHERE_LABEL[sphere].name;
}

function voiceTags(v) {
  const s = v.state || {};
  const tags = [];
  const tipoCtx = s.tipo;
  const tipoLbl = safeLabel(v.sphere, "tipo", s.tipo, tipoCtx);
  if (tipoLbl) tags.push(tipoLbl);
  const ancLbl = safeLabel(v.sphere, "ancoraggio", s.ancoraggio, tipoCtx);
  if (ancLbl) tags.push(ancLbl);
  const innLbl = safeLabel(v.sphere, "innesco", s.innesco, tipoCtx);
  if (innLbl) tags.push(innLbl);
  if (s.ricorrenza) {
    const map = { si: "torna spesso", no: "prima volta", forse: "non lo so" };
    if (map[s.ricorrenza]) tags.push(map[s.ricorrenza]);
  }
  if (typeof s.intensita === "number") tags.push("intensità " + s.intensita + "/5");
  return tags;
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function renderDiary() {
  const all = (voices || []).slice().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  const filtered = diaryFilter === "tutte" ? all : all.filter(v => v.sphere === diaryFilter);

  if (filtered.length === 0) {
    diaryListEl.innerHTML = `
      <div class="diary-empty">
        <div class="empty-icon">🌿</div>
        <div>${all.length === 0 ? "Il tuo Villaggio \u00e8 ancora in attesa.<br>Tocca una bolla per iniziare a tessere." : "Nessuna voce in questa sfera."}</div>
      </div>`;
    return;
  }

  // raggruppa per giorno
  const groups = {};
  const order = [];
  for (const v of filtered) {
    const k = dayKey(v.createdAt);
    if (!groups[k]) { groups[k] = []; order.push(k); }
    groups[k].push(v);
  }

  let html = "";
  for (const k of order) {
    html += `<div class="diary-day"><div class="diary-day-label">${escapeHTML(k)}</div>`;
    for (const v of groups[k]) {
      html += renderCard(v);
    }
    html += `</div>`;
  }
  diaryListEl.innerHTML = html;

  // event delegation
  diaryListEl.querySelectorAll(".diary-card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest(".diary-detail-btn") || e.target.closest(".diary-linked-voice")) return;
      const id = card.dataset.id;
      diaryExpandedId = (diaryExpandedId === id) ? null : id;
      renderDiary();
    });
  });
  diaryListEl.querySelectorAll(".diary-linked-voice").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      diaryExpandedId = btn.dataset.targetId;
      renderDiary();
      // scrolla la voce in vista
      requestAnimationFrame(() => {
        const target = diaryListEl.querySelector(`.diary-card[data-id="${btn.dataset.targetId}"]`);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    });
  });
  diaryListEl.querySelectorAll(".diary-detail-btn[data-action=delete]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (!confirm("Eliminare questa voce dal Villaggio? L'azione non si pu\u00f2 annullare.")) return;
      voices = voices.filter(v => v.id !== id);
      // togli i link che puntavano a questa voce
      voices.forEach(v => {
        if (Array.isArray(v.links)) v.links = v.links.filter(lid => lid !== id);
      });
      try { localStorage.setItem("risonanza_voices", JSON.stringify(voices)); } catch (err) {}
      diaryExpandedId = null;
      updateDiaryCount();
      renderDiary();
      showToast("Voce rimossa dal Villaggio");
    });
  });
}

function renderCard(v) {
  const lbl = SPHERE_LABEL[v.sphere] || { name: v.sphere, place: "", icon: "•" };
  const title = voiceTitle(v);
  const tags = voiceTags(v);
  const expanded = diaryExpandedId === v.id;
  const linksCount = Array.isArray(v.links) ? v.links.length : 0;

  let detailHtml = "";
  if (expanded) {
    const s = v.state || {};
    const rows = [];
    const tipoCtx = s.tipo;
    if (s.tipo)        rows.push(["Tipo",        safeLabel(v.sphere, "tipo", s.tipo, tipoCtx)]);
    if (s.qualita)     rows.push(["Qualit\u00e0",safeLabel(v.sphere, "qualita", s.qualita, tipoCtx)]);
    if (s.sfumatura)   rows.push(["Sfumature",   safeLabel(v.sphere, "sfumatura", s.sfumatura, tipoCtx)]);
    if (s.ancoraggio)  rows.push(["Ancoraggio",  safeLabel(v.sphere, "ancoraggio", s.ancoraggio, tipoCtx)]);
    if (s.innesco)     rows.push(["Innesco",     safeLabel(v.sphere, "innesco", s.innesco, tipoCtx)]);
    if (s.collegamento)rows.push(["Per",         safeLabel(v.sphere, "collegamento", s.collegamento, tipoCtx)]);
    if (s.body)        rows.push(["Nel corpo",   safeLabel(v.sphere, "body", s.body, tipoCtx)]);
    if (typeof s.intensita === "number") rows.push(["Intensit\u00e0", s.intensita + "/5"]);
    if (typeof s.costo === "number" || typeof s.ritorno === "number") {
      rows.push(["Energia", `costo ${s.costo ?? "\u2014"}/5 \u00b7 ritorno ${s.ritorno ?? "\u2014"}/5`]);
    }
    if (s.ricorrenza) {
      const map = { si: "S\u00ec, torna spesso", no: "No, prima volta", forse: "Non lo so" };
      rows.push(["Ricorrenza", map[s.ricorrenza] || s.ricorrenza]);
    }

    let rowsHtml = rows.map(r => `<div class="diary-detail-row"><b>${escapeHTML(r[0])}</b>${escapeHTML(r[1])}</div>`).join("");

    // voci collegate
    let linkedHtml = "";
    if (linksCount > 0) {
      const linkedVoices = (v.links || []).map(id => voices.find(x => x.id === id)).filter(Boolean);
      if (linkedVoices.length > 0) {
        linkedHtml = `<div class="diary-detail-row" style="margin-top:10px;"><b>Fili tessuti</b></div>` +
          linkedVoices.map(lv => {
            const lLbl = SPHERE_LABEL[lv.sphere] || {};
            return `<button class="diary-linked-voice" data-target-id="${escapeHTML(lv.id)}" data-sphere="${escapeHTML(lv.sphere)}">${lLbl.icon || "\u2022"} ${escapeHTML(voiceTitle(lv))} <span style="opacity:0.6">\u00b7 ${escapeHTML(lLbl.name || lv.sphere)}</span></button>`;
          }).join("");
      }
    }

    const fullText = s.testo ? `<div class="diary-detail-row" style="margin-top:10px;"><b>Le tue parole</b></div><div class="diary-card-text" style="margin-top:4px;">${escapeHTML(s.testo)}</div>` : "";

    detailHtml = `
      <div class="diary-card-detail">
        ${rowsHtml}
        ${fullText}
        ${linkedHtml}
        <div class="diary-detail-actions">
          <button class="diary-detail-btn danger" data-action="delete" data-id="${escapeHTML(v.id)}">Elimina</button>
        </div>
      </div>`;
  }

  const shortText = v.state && v.state.testo ? `<div class="diary-card-text">«${escapeHTML(v.state.testo.length > 130 ? v.state.testo.slice(0, 130) + "\u2026" : v.state.testo)}»</div>` : "";
  const linksHtml = linksCount > 0 ? `<div class="diary-card-links"><span class="filo-icon">•—•</span> ${linksCount} ${linksCount === 1 ? "filo intrecciato" : "fili intrecciati"}</div>` : "";

  return `
    <div class="diary-card ${expanded ? "expanded" : ""}" data-sphere="${escapeHTML(v.sphere)}" data-id="${escapeHTML(v.id)}">
      <div class="diary-card-head">
        <span class="diary-card-sphere">${lbl.icon} ${escapeHTML(lbl.name)} \u00b7 ${escapeHTML(lbl.place)}</span>
        <span class="diary-card-time">${escapeHTML(relativeTime(v.createdAt))}</span>
      </div>
      <div class="diary-card-title">${escapeHTML(title)}</div>
      ${tags.length ? `<div class="diary-card-tags">${tags.map(t => `<span class="diary-tag">${escapeHTML(t)}</span>`).join("")}</div>` : ""}
      ${shortText}
      ${linksHtml}
      ${detailHtml}
    </div>`;
}

diaryBtn.addEventListener("click", openDiary);
diaryClose.addEventListener("click", closeDiary);
diaryOverlay.addEventListener("click", closeDiary);
diaryFiltersEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".diary-filter");
  if (!btn) return;
  diaryFilter = btn.dataset.filter;
  diaryFiltersEl.querySelectorAll(".diary-filter").forEach(b => b.classList.toggle("active", b === btn));
  diaryExpandedId = null;
  renderDiary();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && diaryPanel.classList.contains("open")) closeDiary();
});

// inizializza il contatore al caricamento
updateDiaryCount();
</script>
