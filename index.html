<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#B8D4E8">
<title>Risonanza</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #B8D4E8;
    overscroll-behavior: none;
  }
  body { position: relative; }

  /* CIELO DIURNO — soft, ambra sull'orizzonte, azzurro chiaro in alto */
  .sky {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        #A8C9E6 0%,
        #C5DCEC 20%,
        #DEE8EC 35%,
        #F0E4D0 42%);
  }

  /* Sole caldo in alto-destra */
  .sun-glow {
    position: absolute;
    top: -20vh;
    right: -10vw;
    width: 70vmax;
    height: 70vh;
    background: radial-gradient(circle at 70% 90%,
      rgba(255,230,180,0.55) 0%,
      rgba(255,230,180,0.25) 20%,
      rgba(255,230,180,0.08) 45%,
      transparent 70%);
    pointer-events: none;
  }

  /* NUVOLE che passano lentissime */
  .cloud {
    position: absolute;
    pointer-events: none;
    opacity: 0.85;
  }
  @keyframes drift {
    from { transform: translateX(var(--from)); }
    to { transform: translateX(var(--to)); }
  }
  .cloud-move {
    animation: drift linear infinite;
  }

  /* PAESAGGIO SVG */
  .landscape {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* Ruscello — onde che pulsano dolcemente */
  @keyframes streamFlow {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  .stream-shine { animation: streamFlow 5s ease-in-out infinite; }

  /* Finestre villaggio che pulsano con la luce del giorno */
  @keyframes windowFlicker {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }
  .window { animation: windowFlicker ease-in-out infinite; }

  /* Grana leggera */
  .grain {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.04;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .label {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: rgba(30,50,70,0.35); font-family: Georgia, serif; font-style: italic;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; z-index: 10;
  }
</style>
</head>
<body>
  <div class="sky"></div>
  <div class="sun-glow"></div>

  <!-- PAESAGGIO -->
  <svg class="landscape" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
    <defs>
      <!-- mare lontano -->
      <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#8FB8D4" stop-opacity="1"/>
        <stop offset="100%" stop-color="#6A9FC4" stop-opacity="1"/>
      </linearGradient>
      <!-- ruscello -->
      <linearGradient id="streamGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#CCE4F2" stop-opacity="1"/>
        <stop offset="50%" stop-color="#8EBCDC" stop-opacity="1"/>
        <stop offset="100%" stop-color="#5A93BB" stop-opacity="1"/>
      </linearGradient>
      <!-- collina villaggio -->
      <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#A8C088" stop-opacity="1"/>
        <stop offset="100%" stop-color="#708B58" stop-opacity="1"/>
      </linearGradient>
      <!-- foresta -->
      <linearGradient id="forestGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3A5840" stop-opacity="1"/>
        <stop offset="100%" stop-color="#1E3224" stop-opacity="1"/>
      </linearGradient>
      <!-- singolo albero -->
      <linearGradient id="treeGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4A6F50" stop-opacity="1"/>
        <stop offset="100%" stop-color="#2A4530" stop-opacity="1"/>
      </linearGradient>
      <!-- alone finestra -->
      <radialGradient id="windowGlow">
        <stop offset="0%" stop-color="#FFD88A" stop-opacity="1"/>
        <stop offset="100%" stop-color="#FFD88A" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- MARE — linea d'orizzonte attorno al 38% -->
    <rect x="0" y="340" width="1600" height="60" fill="url(#seaGrad)"/>
    <!-- riflessi sul mare -->
    <line x1="150" y1="360" x2="260" y2="360" stroke="#DCEEF7" stroke-width="1.2" opacity="0.55"/>
    <line x1="360" y1="370" x2="440" y2="370" stroke="#DCEEF7" stroke-width="1" opacity="0.45"/>
    <line x1="600" y1="358" x2="720" y2="358" stroke="#DCEEF7" stroke-width="1.2" opacity="0.55"/>
    <line x1="880" y1="368" x2="960" y2="368" stroke="#DCEEF7" stroke-width="1" opacity="0.45"/>
    <line x1="1080" y1="362" x2="1220" y2="362" stroke="#DCEEF7" stroke-width="1.2" opacity="0.5"/>

    <!-- striscia di spiaggia chiara sotto il mare -->
    <path d="M 0 400 Q 400 395 800 400 Q 1200 405 1600 400 L 1600 420 L 0 420 Z"
          fill="#E8DCC0" opacity="0.7"/>

    <!-- COLLINA VILLAGGIO (sinistra, si alza dalla spiaggia) -->
    <path d="M 0 420
             Q 80 380 180 390
             Q 280 400 380 420
             Q 460 435 540 460
             L 540 540
             L 0 540 Z"
          fill="url(#hillGrad)"/>

    <!-- seconda collinetta davanti per dare profondità -->
    <path d="M 0 490
             Q 100 470 200 480
             Q 300 490 400 510
             Q 460 525 520 540
             L 520 560
             L 0 560 Z"
          fill="#839F6A" opacity="0.9"/>

    <!-- CASE DEL VILLAGGIO (sulla collina media) -->
    <g>
      <!-- casa 1 (grande centrale) -->
      <g transform="translate(140 400)">
        <rect x="0" y="25" width="55" height="45" fill="#D8B594"/>
        <polygon points="-4,28 28,0 60,28" fill="#8B3A2E"/>
        <rect class="window" x="18" y="42" width="8" height="12" fill="#FFD88A" style="animation-duration: 5s; animation-delay: 0s;"/>
        <rect class="window" x="32" y="42" width="8" height="12" fill="#FFD88A" style="animation-duration: 4.2s; animation-delay: 1s;"/>
        <rect x="23" y="58" width="10" height="12" fill="#6A4530"/>
      </g>

      <!-- casa 2 (più piccola, a sinistra) -->
      <g transform="translate(70 430)">
        <rect x="0" y="18" width="38" height="32" fill="#E5C7A0"/>
        <polygon points="-3,20 19,0 41,20" fill="#9B4A3A"/>
        <rect class="window" x="13" y="28" width="6" height="9" fill="#FFD88A" style="animation-duration: 6s; animation-delay: 2s;"/>
        <rect x="22" y="38" width="8" height="12" fill="#5C3A25"/>
      </g>

      <!-- campanile a destra -->
      <g transform="translate(240 370)">
        <rect x="0" y="35" width="32" height="80" fill="#EADCC8"/>
        <polygon points="-2,38 16,0 34,38" fill="#7D3428"/>
        <rect class="window" x="11" y="58" width="10" height="14" fill="#FFD88A" style="animation-duration: 7s; animation-delay: 0.5s;"/>
        <circle cx="16" cy="90" r="3" fill="#6A4530"/>
      </g>

      <!-- casa 4 -->
      <g transform="translate(310 420)">
        <rect x="0" y="22" width="44" height="38" fill="#D6B28D"/>
        <polygon points="-3,25 22,0 47,25" fill="#8A3F30"/>
        <rect class="window" x="15" y="32" width="7" height="10" fill="#FFD88A" style="animation-duration: 5.5s; animation-delay: 1.5s;"/>
        <rect class="window" x="26" y="32" width="7" height="10" fill="#FFD88A" style="animation-duration: 4.8s; animation-delay: 2.5s;"/>
      </g>

      <!-- casa 5 -->
      <g transform="translate(395 445)">
        <rect x="0" y="18" width="36" height="30" fill="#E0C099"/>
        <polygon points="-3,20 18,0 39,20" fill="#933E30"/>
        <rect class="window" x="13" y="26" width="6" height="9" fill="#FFD88A" style="animation-duration: 6.5s; animation-delay: 0s;"/>
      </g>

      <!-- casetta 6, più avanti -->
      <g transform="translate(460 485)">
        <rect x="0" y="14" width="32" height="26" fill="#D4B28A"/>
        <polygon points="-2,16 16,0 34,16" fill="#8A3F30"/>
        <rect class="window" x="11" y="22" width="5" height="7" fill="#FFD88A" style="animation-duration: 5s; animation-delay: 2s;"/>
      </g>

      <!-- alberelli sparsi nel villaggio -->
      <g>
        <ellipse cx="110" cy="465" rx="12" ry="15" fill="#5A7845"/>
        <rect x="108" y="475" width="4" height="8" fill="#3E2818"/>
      </g>
      <g>
        <ellipse cx="285" cy="480" rx="10" ry="13" fill="#5A7845"/>
        <rect x="283" y="488" width="3" height="7" fill="#3E2818"/>
      </g>
    </g>

    <!-- RUSCELLO — parte dal bosco, va verso il mare, largo e sinuoso a destra -->
    <g class="stream-shine">
      <!-- letto del ruscello -->
      <path d="M 1600 420
               Q 1500 450 1440 490
               Q 1380 540 1340 600
               Q 1310 660 1290 730
               Q 1275 800 1280 900
               L 1380 900
               Q 1370 810 1385 740
               Q 1400 670 1430 610
               Q 1465 550 1530 500
               Q 1580 460 1600 440 Z"
            fill="url(#streamGrad)"/>

      <!-- ansa che si allarga verso il mare -->
      <path d="M 1600 400
               Q 1520 410 1440 430
               Q 1380 445 1340 460
               L 1340 490
               Q 1400 470 1470 455
               Q 1540 440 1600 430 Z"
            fill="url(#streamGrad)" opacity="0.85"/>

      <!-- onde/riflessi bianchi -->
      <path d="M 1380 520 Q 1400 515 1420 520" stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.7"/>
      <path d="M 1340 620 Q 1360 615 1380 620" stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.7"/>
      <path d="M 1315 700 Q 1335 695 1355 700" stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.7"/>
      <path d="M 1300 780 Q 1320 775 1340 780" stroke="#FFFFFF" stroke-width="1.3" fill="none" opacity="0.7"/>
      <path d="M 1460 490 Q 1490 485 1520 490" stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.6"/>

      <!-- sassolini sulla riva -->
      <circle cx="1280" cy="720" r="3" fill="#9A9180" opacity="0.7"/>
      <circle cx="1275" cy="820" r="2.5" fill="#A89E8B" opacity="0.7"/>
      <circle cx="1400" cy="490" r="2" fill="#9A9180" opacity="0.6"/>
    </g>

    <!-- FORESTA — in basso-sinistra e centro, ALBERI ALTI -->
    <!-- strato di sottobosco (dietro, più scuro) -->
    <path d="M 0 560
             Q 200 545 400 555
             Q 600 565 800 555
             Q 1000 545 1200 560
             L 1200 900 L 0 900 Z"
          fill="url(#forestGrad)"/>

    <!-- Alberi alti individuali — serie davanti -->
    <g>
      <!-- albero 1 (molto alto, sinistra) -->
      <g transform="translate(50 560)">
        <rect x="8" y="180" width="10" height="60" fill="#3E2818"/>
        <polygon points="-22,180 13,50 48,180" fill="url(#treeGrad)"/>
        <polygon points="-18,130 13,30 44,130" fill="url(#treeGrad)"/>
        <polygon points="-14,85 13,10 40,85" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 2 -->
      <g transform="translate(180 580)">
        <rect x="7" y="160" width="8" height="50" fill="#3E2818"/>
        <polygon points="-18,160 11,50 40,160" fill="url(#treeGrad)"/>
        <polygon points="-14,110 11,25 36,110" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 3 (tra i più alti, centro) -->
      <g transform="translate(330 550)">
        <rect x="9" y="200" width="11" height="70" fill="#3E2818"/>
        <polygon points="-25,200 14,50 53,200" fill="url(#treeGrad)"/>
        <polygon points="-20,140 14,25 48,140" fill="url(#treeGrad)"/>
        <polygon points="-15,90 14,5 43,90" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 4 -->
      <g transform="translate(480 590)">
        <rect x="8" y="150" width="9" height="50" fill="#3E2818"/>
        <polygon points="-20,150 12,45 44,150" fill="url(#treeGrad)"/>
        <polygon points="-15,100 12,25 39,100" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 5 -->
      <g transform="translate(620 560)">
        <rect x="9" y="190" width="10" height="65" fill="#3E2818"/>
        <polygon points="-22,190 14,45 50,190" fill="url(#treeGrad)"/>
        <polygon points="-17,135 14,25 45,135" fill="url(#treeGrad)"/>
        <polygon points="-13,85 14,5 41,85" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 6 -->
      <g transform="translate(770 575)">
        <rect x="8" y="170" width="9" height="55" fill="#3E2818"/>
        <polygon points="-20,170 12,40 44,170" fill="url(#treeGrad)"/>
        <polygon points="-15,115 12,20 39,115" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 7 (alto, verso il ruscello) -->
      <g transform="translate(920 555)">
        <rect x="9" y="195" width="10" height="65" fill="#3E2818"/>
        <polygon points="-22,195 14,45 50,195" fill="url(#treeGrad)"/>
        <polygon points="-17,140 14,25 45,140" fill="url(#treeGrad)"/>
        <polygon points="-13,90 14,5 41,90" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 8 -->
      <g transform="translate(1080 580)">
        <rect x="8" y="155" width="9" height="50" fill="#3E2818"/>
        <polygon points="-18,155 12,45 42,155" fill="url(#treeGrad)"/>
        <polygon points="-14,105 12,25 38,105" fill="url(#treeGrad)"/>
      </g>

      <!-- albero 9 (tra bosco e ruscello) -->
      <g transform="translate(1200 560)">
        <rect x="9" y="180" width="10" height="60" fill="#3E2818"/>
        <polygon points="-20,180 14,40 48,180" fill="url(#treeGrad)"/>
        <polygon points="-16,125 14,20 44,125" fill="url(#treeGrad)"/>
        <polygon points="-12,80 14,5 40,80" fill="url(#treeGrad)"/>
      </g>
    </g>

    <!-- terreno del bosco in primo piano (base scura) -->
    <path d="M 0 820
             Q 400 815 800 820
             Q 1000 822 1280 820
             L 1280 900 L 0 900 Z"
          fill="#1A2A1E" opacity="0.95"/>
  </svg>

  <!-- NUVOLE animate che passano -->
  <svg class="cloud cloud-move" style="width:200px; top:8%; --from: 100vw; --to: -220px; animation-duration: 120s;" viewBox="0 0 200 80">
    <ellipse cx="50" cy="45" rx="40" ry="22" fill="#FFFFFF" opacity="0.85"/>
    <ellipse cx="90" cy="35" rx="45" ry="28" fill="#FFFFFF" opacity="0.9"/>
    <ellipse cx="130" cy="45" rx="40" ry="22" fill="#FFFFFF" opacity="0.85"/>
    <ellipse cx="100" cy="50" rx="55" ry="20" fill="#FFFFFF" opacity="0.75"/>
  </svg>

  <svg class="cloud cloud-move" style="width:140px; top:18%; --from: 100vw; --to: -160px; animation-duration: 180s; animation-delay: -60s;" viewBox="0 0 140 60">
    <ellipse cx="35" cy="35" rx="28" ry="16" fill="#FFFFFF" opacity="0.75"/>
    <ellipse cx="70" cy="28" rx="32" ry="20" fill="#FFFFFF" opacity="0.8"/>
    <ellipse cx="105" cy="35" rx="28" ry="16" fill="#FFFFFF" opacity="0.75"/>
  </svg>

  <svg class="cloud cloud-move" style="width:170px; top:3%; --from: 100vw; --to: -190px; animation-duration: 150s; animation-delay: -90s;" viewBox="0 0 170 70">
    <ellipse cx="42" cy="40" rx="35" ry="19" fill="#FFFFFF" opacity="0.7"/>
    <ellipse cx="82" cy="32" rx="38" ry="24" fill="#FFFFFF" opacity="0.78"/>
    <ellipse cx="122" cy="40" rx="35" ry="19" fill="#FFFFFF" opacity="0.7"/>
  </svg>

  <div class="grain"></div>
  <div class="label">step 1.2 v2 · villaggio di giorno</div>
</body>
</html>
