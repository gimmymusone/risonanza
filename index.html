<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfondo Flat Landscape</title>
    <style>
        :root {
            --sky-blue: #b3d9ff;
            --hill-green: #8eb36a;
            --sea-blue: #4a90e2;
            --sand: #f2e3c9;
            --house-body: #d9c5a0;
            --roof-red: #a6443a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenitore principale */
        .hero-background {
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, var(--sky-blue) 0%, #ffffff 100%);
            display: flex;
            align-items: flex-end;
        }

        /* Mare e Spiaggia */
        .sea {
            position: absolute;
            bottom: 20%;
            width: 100%;
            height: 15%;
            background-color: var(--sea-blue);
            z-index: 1;
        }

        .beach {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60%;
            height: 25%;
            background-color: var(--sand);
            z-index: 2;
            clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
        }

        /* Collina con Case */
        .hill {
            position: absolute;
            bottom: 0;
            left: -5%;
            width: 50%;
            height: 60%;
            background: linear-gradient(135deg, #a4c683 0%, var(--hill-green) 100%);
            border-radius: 0 100% 0 0;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Gruppo di Case (Esempio semplificato) */
        .village {
            position: relative;
            bottom: 10%;
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        .house {
            width: 40px;
            height: 40px;
            background-color: var(--house-body);
            position: relative;
        }

        .house::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 20px solid var(--roof-red);
        }

        .tower {
            width: 30px;
            height: 80px;
            background-color: #f0f0f0;
            position: relative;
        }

        .tower::before {
            content: '';
            position: absolute;
            top: -25px;
            left: -5px;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 25px solid var(--roof-red);
        }

        /* Contenuto del sito */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            text-align: center;
            padding-bottom: 20vh;
            color: #333;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <section class="hero-background">
        <div class="sea"></div>
        <div class="beach"></div>
        
        <div class="hill">
            <div class="village">
                <div class="house"></div>
                <div class="tower"></div>
                <div class="house"></div>
            </div>
        </div>

        <div class="content">
            <h1>Benvenuti nel Sito</h1>
            <p>Un design pulito ispirato al tuo concetto.</p>
        </div>
    </section>

</body>
</html>
